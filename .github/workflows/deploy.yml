name: Test, Build & Deploy

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run tests
        run: npm run test

      - name: Type check
        run: npx tsc --noEmit

  deploy:
    needs: test
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}

            echo ">>> Pulling latest code..."
            git pull origin master

            echo ">>> Backing up database before deploy..."
            docker compose run --rm backup /bin/sh -c "
              TIMESTAMP=$(date +%Y%m%d_%H%M%S) &&
              apk add --no-cache sqlite 2>/dev/null &&
              sqlite3 /data/eva-covenant.db \".backup /backups/pre-deploy_$${TIMESTAMP}.db\" &&
              echo 'Pre-deploy backup created'
            " || echo "Pre-deploy backup skipped (first deploy or no data)"

            echo ">>> Building & restarting..."
            docker compose down
            docker compose up -d --build

            echo ">>> Cleaning up..."
            docker image prune -f
            docker builder prune -f

            echo ">>> Health check..."
            for i in 1 2 3 4 5 6; do
              sleep 5
              if curl -sf http://localhost:8092/api/stats > /dev/null; then
                echo ">>> Health check passed! Deploy done."
                exit 0
              fi
              echo "Attempt $i/6 failed, retrying..."
            done
            echo ">>> Health check failed!"
            exit 1
