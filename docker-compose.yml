services:
  app:
    image: ${IMAGE:-xiaoyuyu123/eva-covenant:latest}
    container_name: eva-covenant
    restart: unless-stopped
    ports:
      - "${PORT:-8092}:3002"
    volumes:
      - ./data:/app/prisma
      - ./backups:/backups
    environment:
      - NODE_ENV=production
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
      - ADMIN_SECRET=${ADMIN_SECRET:-eva-covenant-secret}
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3002/api/stats"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
